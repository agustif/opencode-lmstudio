name: Setup OpenCode
description: Install and cache a pinned OpenCode CLI release

inputs:
  version:
    description: OpenCode version without the leading v
    required: true
  cache:
    description: Cache the installed binary; disable when switching versions in one job
    required: false
    default: "true"

outputs:
  binary:
    description: Absolute path to the OpenCode binary
    value: ${{ steps.verify.outputs.binary }}

runs:
  using: composite
  steps:
    - name: Validate requested version
      shell: bash
      env:
        OPENCODE_VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail
        [[ "$OPENCODE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || {
          echo "Expected an exact OpenCode version, got: $OPENCODE_VERSION" >&2
          exit 1
        }

    # Install the immutable official release asset for the runner platform.
    - name: Cache OpenCode
      id: cache
      if: inputs.cache == 'true'
      uses: actions/cache@v5
      with:
        path: ~/.opencode/bin
        key: opencode-${{ runner.os }}-${{ runner.arch }}-${{ inputs.version }}

    - name: Install OpenCode
      if: inputs.cache != 'true' || steps.cache.outputs.cache-hit != 'true'
      shell: bash
      env:
        OPENCODE_VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail
        rm -rf "$HOME/.opencode/bin"
        mkdir -p "$HOME/.opencode/bin"
        case "${RUNNER_OS}/${RUNNER_ARCH}" in
          Linux/X64) asset=opencode-linux-x64.tar.gz ;;
          Linux/ARM64) asset=opencode-linux-arm64.tar.gz ;;
          macOS/X64) asset=opencode-darwin-x64.zip ;;
          macOS/ARM64) asset=opencode-darwin-arm64.zip ;;
          Windows/X64) asset=opencode-windows-x64.zip ;;
          Windows/ARM64) asset=opencode-windows-arm64.zip ;;
          *) echo "Unsupported OpenCode runner: ${RUNNER_OS}/${RUNNER_ARCH}" >&2; exit 1 ;;
        esac
        url="https://github.com/anomalyco/opencode/releases/download/v${OPENCODE_VERSION}/${asset}"
        archive="$RUNNER_TEMP/$asset"
        curl --fail --silent --show-error --location "$url" --output "$archive"
        case "$asset" in
          *.zip) unzip -q -j "$archive" -d "$HOME/.opencode/bin" ;;
          *.tar.gz) tar -xzf "$archive" -C "$HOME/.opencode/bin" ;;
        esac

    - name: Export and verify OpenCode
      id: verify
      shell: bash
      env:
        OPENCODE_VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail
        binary="$HOME/.opencode/bin/opencode"
        if [[ "$RUNNER_OS" = Windows ]]; then
          binary="$HOME/.opencode/bin/opencode.exe"
        fi
        test -x "$binary"
        actual="$($binary --version)"
        test "$actual" = "$OPENCODE_VERSION" || {
          echo "Expected OpenCode $OPENCODE_VERSION, got $actual" >&2
          exit 1
        }
        export_dir="$HOME/.opencode/bin"
        export_binary="$binary"
        if [[ "$RUNNER_OS" = Windows ]]; then
          export_dir=$(cygpath -w "$export_dir")
          export_binary=$(cygpath -w "$export_binary")
        fi
        echo "$export_dir" >> "$GITHUB_PATH"
        echo "OPENCODE_BIN=$export_binary" >> "$GITHUB_ENV"
        echo "binary=$export_binary" >> "$GITHUB_OUTPUT"
