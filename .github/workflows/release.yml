name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Exact stable or prerelease package version committed on main, without v
        required: true
        type: string
      publish:
        description: Publish npm and finalize the GitHub release
        required: true
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

env:
  NODE_VERSION: 24.15.0
  BUN_VERSION: 1.3.9
  VERSION: ${{ inputs.version }}

jobs:
  release:
    name: Validate and optionally publish
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: release
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          registry-url: https://registry.npmjs.org

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Validate release request
        id: release
        shell: bash
        run: |
          set -euo pipefail
          metadata=$(bun scripts/release-version.ts "$VERSION")
          printf '%s\n' "$metadata" >> "$GITHUB_OUTPUT"
          tag=$(printf '%s\n' "$metadata" | sed -n 's/^git_tag=//p')
          test -n "$tag"
          test "${GITHUB_REF_NAME}" = main
          actual=$(node -p 'require("./package.json").version')
          test "$actual" = "$VERSION" || {
            echo "package.json is $actual, requested $VERSION" >&2
            exit 1
          }
          test -f "docs/releases/${tag}.md"
          git diff --exit-code

      - name: Install dependencies
        run: npm ci

      - name: Core release preflight
        run: npm run release:check

      - name: Read latest tested OpenCode version
        id: latest
        shell: bash
        run: echo "version=$(tr -d '[:space:]' < .opencode-version)" >> "$GITHUB_OUTPUT"

      - name: Setup latest tested OpenCode
        uses: ./.github/actions/setup-opencode
        with:
          version: ${{ steps.latest.outputs.version }}
          cache: false

      - name: Run real OpenCode CLI smoke
        run: npm run smoke:opencode

      - name: Read pinned TUI OpenCode version
        id: tui
        shell: bash
        run: echo "version=$(tr -d '[:space:]' < .opencode-tui-version)" >> "$GITHUB_OUTPUT"

      - name: Setup pinned TUI OpenCode
        uses: ./.github/actions/setup-opencode
        with:
          version: ${{ steps.tui.outputs.version }}
          cache: false

      - name: Run Microsoft TUI Test and verify screenshots
        run: npm run test:tui:check

      - name: Preview package
        run: npm pack --json > package-preview.json

      - name: Upload release evidence
        uses: actions/upload-artifact@v7
        with:
          name: release-evidence-${{ inputs.version }}
          path: |
            coverage/
            docs/screenshots/
            package-preview.json
            tui-traces/
          if-no-files-found: ignore
          retention-days: 30

      - name: Ensure release does not already exist
        if: inputs.publish
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.git_tag }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists" >&2
            exit 1
          fi
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists" >&2
            exit 1
          fi

      - name: Stage draft GitHub release
        if: inputs.publish
        env:
          GH_TOKEN: ${{ github.token }}
          IS_PRERELEASE: ${{ steps.release.outputs.is_prerelease }}
          TAG: ${{ steps.release.outputs.git_tag }}
        shell: bash
        run: |
          set -euo pipefail
          args=(
            release create "$TAG"
            --target "$GITHUB_SHA"
            --title "opencode-lmstudio $TAG"
            --notes-file "docs/releases/${TAG}.md"
            --draft
          )
          if [[ "$IS_PRERELEASE" = true ]]; then
            args+=(--prerelease)
          fi
          gh "${args[@]}"

      - name: Publish npm package with provenance
        id: publish
        if: inputs.publish
        env:
          NPM_TAG: ${{ steps.release.outputs.npm_tag }}
        run: npm publish --provenance --access public --tag "$NPM_TAG"

      - name: Verify published npm channel
        if: inputs.publish
        env:
          IS_PRERELEASE: ${{ steps.release.outputs.is_prerelease }}
          NPM_TAG: ${{ steps.release.outputs.npm_tag }}
        shell: bash
        run: |
          set -euo pipefail
          package=$(node -p 'require("./package.json").name')
          published=""
          for attempt in $(seq 1 12); do
            published=$(npm view "${package}@${NPM_TAG}" version 2>/dev/null || true)
            [[ "$published" = "$VERSION" ]] && break
            echo "Waiting for ${package}@${NPM_TAG} propagation (attempt ${attempt}/12)"
            sleep 5
          done
          test "$published" = "$VERSION" || {
            echo "Expected ${package}@${NPM_TAG} to resolve to $VERSION, got: $published" >&2
            exit 1
          }
          if [[ "$IS_PRERELEASE" = true ]]; then
            stable=$(npm view "${package}@latest" version)
            test "$stable" != "$VERSION" || {
              echo "Prerelease $VERSION must not replace npm latest" >&2
              exit 1
            }
          fi

      - name: Finalize GitHub release
        if: inputs.publish
        env:
          GH_TOKEN: ${{ github.token }}
          IS_PRERELEASE: ${{ steps.release.outputs.is_prerelease }}
          TAG: ${{ steps.release.outputs.git_tag }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$IS_PRERELEASE" = true ]]; then
            gh release edit "$TAG" --draft=false --prerelease
          else
            gh release edit "$TAG" --draft=false --latest
          fi

      - name: Remove staged release after npm publish failure
        if: failure() && steps.publish.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.git_tag }}
        run: gh release delete "$TAG" --yes --cleanup-tag
