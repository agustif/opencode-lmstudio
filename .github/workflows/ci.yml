name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 24.15.0
  BUN_VERSION: 1.3.9

jobs:
  quality:
    name: Quality and package
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:run

      - name: Coverage
        run: npm run test:coverage

      - name: Clean build
        run: npm run build

      - name: Dependency audit
        run: npm audit --audit-level=high

      - name: Package preview
        run: npm pack --dry-run

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore
          retention-days: 14

  latest-opencode-smoke:
    name: Latest OpenCode smoke
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Read latest compatibility version
        id: version
        shell: bash
        run: echo "version=$(tr -d '[:space:]' < .opencode-version)" >> "$GITHUB_OUTPUT"

      - name: Setup latest tested OpenCode
        uses: ./.github/actions/setup-opencode
        with:
          version: ${{ steps.version.outputs.version }}

      - name: Pack candidate
        id: package
        shell: bash
        run: |
          npm pack --json > package-preview.json
          tarball=$(node -e 'const fs=require("node:fs"); const value=JSON.parse(fs.readFileSync("package-preview.json", "utf8")); process.stdout.write(value[0].filename)')
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"

      - name: Run real OpenCode CLI smoke
        run: npm run smoke:opencode

      - name: Run ACP JSON-RPC purity smoke
        run: npm run smoke:opencode:acp

      - name: Run native npm-resolver candidate smoke
        run: npm run smoke:opencode:resolver -- --tarball "${{ steps.package.outputs.tarball }}" --expected-version "$(node -p 'require("./package.json").version')"

  pinned-opencode-tui:
    name: Pinned OpenCode TUI and screenshots
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium for xterm.js screenshots
        run: npx playwright install --with-deps chromium

      - name: Read TUI compatibility version
        id: version
        shell: bash
        run: echo "version=$(tr -d '[:space:]' < .opencode-tui-version)" >> "$GITHUB_OUTPUT"

      - name: Setup pinned TUI OpenCode
        uses: ./.github/actions/setup-opencode
        with:
          version: ${{ steps.version.outputs.version }}

      - name: Run Microsoft TUI Test and verify generated screenshots
        run: npm run test:tui:check

      - name: Upload TUI evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: tui-evidence
          path: |
            .tui-test/screenshots/
            docs/screenshots/
            tui-traces/
          if-no-files-found: warn
          retention-days: 14

  minimum-opencode-compatibility:
    name: Minimum OpenCode CLI and ACP
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Read minimum compatibility version
        id: version
        shell: bash
        run: echo "version=$(tr -d '[:space:]' < .opencode-tui-version)" >> "$GITHUB_OUTPUT"

      - name: Setup minimum supported OpenCode
        uses: ./.github/actions/setup-opencode
        with:
          version: ${{ steps.version.outputs.version }}

      - name: Pack candidate
        id: package
        shell: bash
        run: |
          npm pack --json > package-preview.json
          tarball=$(node -e 'const fs=require("node:fs"); const value=JSON.parse(fs.readFileSync("package-preview.json", "utf8")); process.stdout.write(value[0].filename)')
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"

      - name: Run real OpenCode CLI smoke
        run: npm run smoke:opencode

      - name: Run ACP JSON-RPC purity smoke
        run: npm run smoke:opencode:acp

      - name: Run native npm-resolver candidate smoke
        run: npm run smoke:opencode:resolver -- --tarball "${{ steps.package.outputs.tarball }}" --expected-version "$(node -p 'require("./package.json").version')"

  platform-smoke:
    name: ${{ matrix.os }} OpenCode CLI and ACP
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Read current compatibility version
        id: version
        shell: bash
        run: echo "version=$(tr -d '[:space:]' < .opencode-version)" >> "$GITHUB_OUTPUT"

      - name: Setup current OpenCode
        uses: ./.github/actions/setup-opencode
        with:
          version: ${{ steps.version.outputs.version }}

      - name: Run real OpenCode CLI smoke
        run: npm run smoke:opencode

      - name: Run ACP JSON-RPC purity smoke
        run: npm run smoke:opencode:acp

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
